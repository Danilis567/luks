l_english:
 LUX_yeni_duzenin_safagi:0 "Dawn of the New Order"
 LUX_yeni_duzenin_safagi_desc:0 "A new dawn rises for Luxembourg. With the discipline and order brought by fascism, we will reshape our nation."
 LUX_okullari_fasistlestir:0 "Fascistize the Schools"
 LUX_okullari_fasistlestir_desc:0 "To raise future generations as disciplined individuals loyal to the new order, we reorganize the education system in line with fascist ideology."
 LUX_halki_orgutle:0 "Organize the Public"
 LUX_halki_orgutle_desc:0 "We unite every segment of society around our national awakening, gathering support for our fascist cause."
 LUX_orduyu_duzenle:0 "Reorganize the Army"
 LUX_orduyu_duzenle_desc:0 "We restructure our armed forces as the loyal guardian and protective power of the new regime."
 LUX_sanayiyi_orgutle:0 "Organize the Industry"
 LUX_sanayiyi_orgutle_desc:0 "By putting our industry under state control, we maximize efficiency and our national strength."
 LUX_fasist_iktidar:0 "Fascist Rule"
 LUX_fasist_iktidar_desc:0 "Having gained the necessary social support, we completely seize power. Luxembourg is now a fascist state!"
 LUX_fransa_ile_ittifak:0 "Alliance with France"
 LUX_fransa_ile_ittifak_desc:0 "For our security and future, we establish an alliance with our western neighbor France."
 LUX_almanya_ile_ittifak:0 "Alliance with Germany"
 LUX_almanya_ile_ittifak_desc:0 "Hand in hand with Germany, the leader of the Axis, we take our place in the new world order."
 LUX_fransiz_havacilik_destegi:0 "French Aviation Support"
 LUX_fransiz_havacilik_destegi_desc:0 "We modernize our air force with the support of French engineers and aviation experts."
 LUX_alman_zirhli_destegi:0 "German Armored Support"
 LUX_alman_zirhli_destegi_desc:0 "Receiving German tank doctrines and armored support, we strengthen our logistical infrastructure and army."
 LUX_fransiz_sanayi_yardimi:0 "French Industrial Aid"
 LUX_fransiz_sanayi_yardimi_desc:0 "We bring new factories to Luxembourg with investments and aid coming from France."
 LUX_alman_sanayi_yatirimlari:0 "German Industrial Investments"
 LUX_alman_sanayi_yatirimlari_desc:0 "Thanks to German industrial investments, we establish new production lines and factories in our country."
 LUX_buyuk_luksemburg_ordusu:0 "Great Luxembourg Army"
 LUX_buyuk_luksemburg_ordusu_desc:0 "We establish the strongest, most disciplined, and determined army in our history. The Luxembourg army is ready for offense and defense!"
 LUX_belcika_milliyetcilerini_orgutle:0 "Organize Belgian Nationalists"
 LUX_belcika_milliyetcilerini_orgutle_desc:0 "We contact the fascist and nationalist elements in Belgium and organize them against their regime."
 LUX_merkez_istihbarat_teskilati:0 "Central Intelligence Agency"
 LUX_merkez_istihbarat_teskilati_desc:0 "We establish a modern intelligence agency to coordinate our foreign operations and internal security."
 LUX_hollanda_milliyetcilerini_orgutle:0 "Organize Dutch Nationalists"
 LUX_hollanda_milliyetcilerini_orgutle_desc:0 "We organize our nationalist brothers in the Netherlands and mobilize them for our common goals."
 LUX_belcikaya_silah_sevkiyati:0 "Weapon Shipments to Belgium"
 LUX_belcikaya_silah_sevkiyati_desc:0 "We secretly ship weapons and ammunition to start the nationalist uprising in Belgium."
 LUX_siyasileri_satil_al:0 "Bribe Politicians"
 LUX_siyasileri_satil_al_desc:0 "Through our intelligence network, we bribe key politicians in Belgium and the Netherlands to bring them over to our side."
 LUX_hollandaya_silah_sevkiyati:0 "Weapon Shipments to Netherlands"
 LUX_hollandaya_silah_sevkiyati_desc:0 "We provide weapon support to the rebels in the Netherlands, preparing them for the uprising."
 LUX_belcikada_ayaklanma:0 "Uprising in Belgium"
 LUX_belcikada_ayaklanma_desc:0 "Our preparations in Belgium are complete. Fascist nationalists take up arms and revolt against the government!"
 LUX_hollandada_ayaklanma:0 "Uprising in Netherlands"
 LUX_hollandada_ayaklanma_desc:0 "The politicians we bribed and the nationalists we armed in the Netherlands launch a simultaneous rebellion!"
 LUX_buyuk_fasist_beneluks:0 "Great Fascist Benelux"
 LUX_buyuk_fasist_beneluks_desc:0 "Taking advantage of the civil wars in Belgium and the Netherlands, we annex them completely, integrate their armies, and declare the Great Fascist Benelux!"

 LUX_yeni_duzenin_safagi_spirit:0 "Dawn of the New Order"
 LUX_yeni_duzenin_safagi_spirit_desc:0 "Daily support for fascism is increasing in the country."
 LUX_fasist_iktidar_spirit:0 "Fascist Rule"
 LUX_fasist_iktidar_spirit_desc:0 "Thanks to the discipline and stability of the fascist regime, our nation is united."
 LUX_alman_zirhli_destegi_spirit:0 "German Armored Support"
 LUX_alman_zirhli_destegi_spirit_desc:0 "Technical support from Germany accelerates rail infrastructure and train production."
 LUX_buyuk_luksemburg_ordusu_spirit:0 "Great Luxembourg Army"
 LUX_buyuk_luksemburg_ordusu_spirit_desc:0 "Our glorious army with maximized attack power and defensive resolve."
 LUX_merkez_istihbarat_teskilati_spirit:0 "Central Intelligence Agency"
 LUX_merkez_istihbarat_teskilati_spirit_desc:0 "Advanced intelligence network increasing operational agent capacity."

 LUX_sadik_muttefik:0 "Loyal Ally"
 LUX_sadik_muttefik_desc:0 "We choose the path of cooperation, cementing our place within our faction as a trustworthy and invaluable partner."
 LUX_hegemonya_ihtirasi:0 "Passion for Hegemony"
 LUX_hegemonya_ihtirasi_desc:0 "True power is not shared. We begin planning the ultimate betrayal of our so-called allies to establish our own supremacy."
 LUX_ittifak_ar_ge_agi:0 "Alliance R&D Network"
 LUX_ittifak_ar_ge_agi_desc:0 "By sharing our technological advancements and coordinating research, we elevate the scientific output of the entire faction."
 LUX_ortak_sanayi_uretimi:0 "Joint Industrial Production"
 LUX_ortak_sanayi_uretimi_desc:0 "We align our manufacturing standards with our müttefiks, increasing production efficiency across all factories."
 LUX_yabanci_lejyonlar:0 "Foreign Legions"
 LUX_yabanci_lejyonlar_desc:0 "Opening our ranks to foreign volunteers, we muster a formidable force of non-citizens ready to fight for our flag."
 LUX_muttefik_tedarik_zinciri:0 "Alliance Supply Chain"
 LUX_muttefik_tedarik_zinciri_desc:0 "Establishing robust logistics routes to our allies allows mutual economic expansion, directly fueling our industrial base."
 LUX_avrupa_manhattan_projesi:0 "European Manhattan Project"
 LUX_avrupa_manhattan_projesi_desc:0 "Pooling the finest minds and resources of our alliance, we embark on the ultimate quest to unlock atomic energy."
 LUX_bati_siniri_iddialari:0 "Western Border Claims"
 LUX_bati_siniri_iddialari_desc:0 "The historical lands to our west belong to the Grand Duchy. We formulate our rightful claims on French territories."
 LUX_dogu_siniri_iddialari:0 "Eastern Border Claims"
 LUX_dogu_siniri_iddialari_desc:0 "The lands across our eastern border must be integrated. We lay out our claims on crucial German regions."
 LUX_fransiz_zayifligi:0 "French Weakness"
 LUX_fransiz_zayifligi_desc:0 "The French republic is fragile. We study their defenses to exploit their tactical vulnerability."
 LUX_alman_kibri:0 "German Pride"
 LUX_alman_kibri_desc:0 "German overconfidence will be their downfall. We devise strategies to strike them where they least expect it."
 LUX_parise_yuruyus:0 "March on Paris"
 LUX_parise_yuruyus_desc:0 "The time has come. We initiate the offensive towards Paris to dictate our terms directly from their capital."
 LUX_renanya_operasyonu:0 "Rhineland Operation"
 LUX_renanya_operasyonu_desc:0 "Our forces cross the Rhine. We strike deep into Germany to force them into submission."
 LUX_lotharingianin_dirilisi:0 "Resurrection of Lotharingia"
 LUX_lotharingianin_dirilisi_desc:0 "The ancient middle realm of Lotharingia is reborn under our iron rule, spanning from the North Sea to the Alps."

 LUX_sadik_muttefik_spirit:0 "Loyal Ally"
 LUX_sadik_muttefik_spirit_desc:0 "We are a trusted faction member, granting us increased political standing and domestic stability."
 LUX_hegemonya_ihtirasi_spirit:0 "Passion for Hegemony"
 LUX_hegemonya_ihtirasi_spirit_desc:0 "Our secret plans and espionage networks grant us additional operative capacity."
 LUX_ittifak_ar_ge_agi_spirit:0 "Alliance R&D Network"
 LUX_ittifak_ar_ge_agi_spirit_desc:0 "Coordinated research efforts increase our scientific advancement speed."
 LUX_ortak_sanayi_uretimi_spirit:0 "Joint Industrial Production"
 LUX_ortak_sanayi_uretimi_spirit_desc:0 "Shared production methods boost overall factory output."
 LUX_yabanci_lejyonlar_spirit:0 "Foreign Legions"
 LUX_yabanci_lejyonlar_spirit_desc:0 "Large numbers of foreign volunteers swell our army ranks from non-core states."
 LUX_avrupa_manhattan_projesi_spirit:0 "European Manhattan Project"
 LUX_avrupa_manhattan_projesi_spirit_desc:0 "Unprecedented atomic research acceleration and reactor construction speed."
 LUX_fransiz_zayifligi_spirit:0 "French Weakness"
 LUX_fransiz_zayifligi_spirit_desc:0 "Tactical knowledge of French weak spots increases our military offensive capabilities."
 LUX_alman_kibri_spirit:0 "German Pride"
 LUX_alman_kibri_spirit_desc:0 "Exploiting German strategic oversight grants our forces increased combat efficiency."

 lux_endgame.1.t:0 "The Fall of Paris"
 lux_endgame.1.d:0 "With Luxembourgish troops marching through the streets of Paris, the French government has agreed to a white peace. They have officially signed over the western border states of Calais, Picardie, Champagne, Franche-Comté, and Alsace-Lorraine to our rightful administration."
 lux_endgame.1.a:0 "A glorious victory for the Grand Duchy!"
 lux_endgame.2.t:0 "The Fall of Berlin"
 lux_endgame.2.d:0 "Having captured Berlin, the German high command has sued for peace. To preserve their sovereignty, they have officially signed a white peace and ceded the critical border regions of Moselland and Rhineland to Luxembourg."
 lux_endgame.2.a:0 "Germany yields to our supremacy!"

 # Democratic Focuses
 LUX_biz_neden_variz:0 "Why Do We Exist?"
 LUX_biz_neden_variz_desc:0 "In 1936, the Grand Duchy of Luxembourg finds itself disarmed, neutral, and surrounded by expanding powers. Yet, our steel industry is key. Let us assess our situation."
 LUX_demokrasiyi_koru:0 "Protect Democracy"
 LUX_demokrasiyi_koru_desc:0 "Democracy is the core value of our nation. We must defend and secure our democratic institutions."
 LUX_buyuk_dusesin_yetkileri:0 "Grand Duchess's Authority"
 LUX_buyuk_dusesin_yetkileri_desc:0 "We will expand the administrative powers of the Grand Duchess to bring stability and order to our governance."
 LUX_radikallere_goz_yum:0 "Tolerate the Radicals"
 LUX_radikallere_goz_yum_desc:0 "By allowing fringe political movements to speak, we can better understand their influence and guide our future plans."
 LUX_zenon_bernard_devrimi:0 "Zenon Bernard's Revolution"
 LUX_zenon_bernard_devrimi_desc:0 "Under the guidance of Zenon Bernard, the workers of Luxembourg will lead us into a new communist era."
 LUX_volksdeutsche_bewegung:0 "Volksdeutsche Bewegung"
 LUX_volksdeutsche_bewegung_desc:0 "Establishing closer ties with Germany and organizing regional German movements to secure our sovereignty."
 LUX_beneluks_diplomasisi:0 "Benelux Diplomacy"
 LUX_beneluks_diplomasisi_desc:0 "We must approach Belgium and the Netherlands to construct a unified economic and diplomatic front."
 LUX_arbed_celik_ihracati:0 "ARBED Steel Exports"
 LUX_arbed_celik_ihracati_desc:0 "We will expand exports from our major steel manufacturer ARBED to stimulate our national economy."
 LUX_luksemburg_bankacilik_kanunu:0 "Luxembourg Banking Law"
 LUX_luksemburg_bankacilik_kanunu_desc:0 "Passing new legislation to modernize our banking system, inviting foreign investment."
 LUX_avrupanin_siginagi:0 "Europe's Sanctuary"
 LUX_avrupanin_siginagi_desc:0 "We will establish Luxembourg as a safe haven for refugees fleeing political oppression."
 LUX_bruksel_ile_yakinlasma:0 "Rapprochement with Brussels"
 LUX_bruksel_ile_yakinlasma_desc:0 "We will negotiate mutual defense and administrative cooperation agreements with Belgium."
 LUX_hollanda_ile_ticari_pakt:0 "Trade Pact with Netherlands"
 LUX_hollanda_ile_ticari_pakt_desc:0 "A trade agreement with the Dutch will open up new markets for our industrial outputs."
 LUX_agir_sanayi_tesvikleri:0 "Heavy Industry Incentives"
 LUX_agir_sanayi_tesvikleri_desc:0 "Subsidizing steel works and infrastructure to prepare our nation for rapid industrial expansion."
 LUX_hafif_sanayi_ve_teknoloji:0 "Light Industry & Tech"
 LUX_hafif_sanayi_ve_teknoloji_desc:0 "Developing consumer goods and modern technologies to improve standard of living."
 LUX_serbest_sermaye_dolasimi:0 "Free Capital Circulation"
 LUX_serbest_sermaye_dolasimi_desc:0 "Allowing capital to flow freely will boost financial investments in our industrial base."
 LUX_siyasi_multeci_entegrasyonu:0 "Political Refugee Integration"
 LUX_siyasi_multeci_entegrasyonu_desc:0 "Integrating refugees into our society and workforce, increasing our available manpower."
 LUX_genisletilmis_refah_devleti:0 "Expanded Welfare State"
 LUX_genisletilmis_refah_devleti_desc:0 "Implementing welfare programs to improve the stability and happiness of our citizens."
 LUX_ortak_sinir_devriyeleri:0 "Joint Border Patrols"
 LUX_ortak_sinir_devriyeleri_desc:0 "Forming joint border security forces with our neighbors to secure the region."
 LUX_avrupa_komur_ve_celik_vizyonu:0 "European Coal & Steel Vision"
 LUX_avrupa_komur_ve_celik_vizyonu_desc:0 "A collaborative industrial vision to lay down the foundations of a unified European trade sphere."
 LUX_anti_fasist_sivil_savunma:0 "Anti-Fascist Civil Defense"
 LUX_anti_fasist_sivil_savunma_desc:0 "Organizing local defense structures and educational campaigns to combat rising fascism."
 LUX_belcika_luksemburg_ortak_ordusu:0 "Joint Belgian-Luxembourg Army"
 LUX_belcika_luksemburg_ortak_ordusu_desc:0 "Integrating military commands with Belgium for a stronger mutual defense."
 LUX_ekonomik_tam_bagimsizlik:0 "Economic Independence"
 LUX_ekonomik_tam_bagimsizlik_desc:0 "Securing our resource supply chains to protect our sovereignty from foreign manipulation."
 LUX_demokratik_gonullu_milisler:0 "Democratic Volunteer Militia"
 LUX_demokratik_gonullu_milisler_desc:0 "Raising democratic volunteer regiments to bolster our small defense force."
 LUX_flemenk_butunlesme_komitesi:0 "Flemish Integration Committee"
 LUX_flemenk_butunlesme_komitesi_desc:0 "Establishing a joint commission to coordinate the administrative union of our states."
 LUX_flemenk_cumhuriyetini_ilan_et:0 "Declare the Flemish Republic"
 LUX_flemenk_cumhuriyetini_ilan_et_desc:0 "Uniting Luxembourg and Belgium into a single democratic Flemish Republic."
 LUX_buyuk_gucleri_yatistirmak:0 "Appease the Great Powers"
 LUX_buyuk_gucleri_yatistirmak_desc:0 "Assuring our neighbors and the Great Powers that our regional integration is purely defensive."
 LUX_birlesik_flemenk_ordusu:0 "United Flemish Army"
 LUX_birlesik_flemenk_ordusu_desc:0 "Fully combining our army forces into a unified defensive command."
 LUX_lahey_muzakereleri:0 "The Hague Negotiations"
 LUX_lahey_muzakereleri_desc:0 "Opening negotiations in The Hague to invite the Netherlands into our democratic union."
 LUX_lahey_muzakereleri_tooltip:0 "Enables the integration of the Netherlands into the Benelux Union."
 LUX_hollanda_ordusuna_garantiler:0 "Guarantees to the Dutch Army"
 LUX_hollanda_ordusuna_garantiler_desc:0 "Assuring the Dutch military commands of their roles and representation in the unified Benelux army."
 LUX_nassau_hanedanlarini_birlestirmek:0 "Unite the Nassau Dynasties"
 LUX_nassau_hanedanlarini_birlestirmek_desc:0 "Unifying our historical royal houses to consolidate the bond of our peoples."
 LUX_flemenk_kardesligi_cagrisi:0 "Call for Flemish Brotherhood"
 LUX_flemenk_kardesligi_cagrisi_desc:0 "Appealing to our shared cultural and historical heritage to support the union."
 LUX_buyuk_beneluks_ruyasi:0 "The Great Benelux Dream"
 LUX_buyuk_beneluks_ruyasi_desc:0 "Realizing the ultimate dream: a united, democratic, and powerful Benelux Union."
 LUX_beneluks_altyapi_agi:0 "Benelux Infrastructure Network"
 LUX_beneluks_altyapi_agi_desc:0 "Linking our major industrial cities and ports with a high-capacity infrastructure grid."
 LUX_kitanin_celik_kalkani:0 "Steel Shield of the Continent"
 LUX_kitanin_celik_kalkani_desc:0 "Building a solid defensive line along our borders to protect our union from expansionist powers."

  # Democratic National Spirits
  LUX_banking_law:0 "Luxembourg Banking Law"
  LUX_banking_law_desc:0 "A modern financial sector brings capital and stability to Luxembourg."
  LUX_open_door_policy:0 "Open Door Policy"
  LUX_open_door_policy_desc:0 "Welcoming refugees strengthens our nation's workforce and moral standing."
  LUX_heavy_industry:0 "Heavy Industry Incentives"
  LUX_heavy_industry_desc:0 "Prioritizing heavy manufacturing increases our factory output."
  LUX_light_industry:0 "Light Industry Incentives"
  LUX_light_industry_desc:0 "Prioritizing consumer goods production keeps our population happy and stable."
  LUX_refugee_integration:0 "Refugee Integration"
  LUX_refugee_integration_desc:0 "Integrated refugees contribute to our economy and public support."
  LUX_joint_border_patrols:0 "Joint Border Patrols"
  LUX_joint_border_patrols_desc:0 "Coordinated patrols keep our borders safe and secure."
  LUX_coal_and_steel_vision:0 "European Coal and Steel Vision"
  LUX_coal_and_steel_vision_desc:0 "Joint resources coordination accelerates our industrial expansion."
  LUX_joint_army:0 "Joint Belgian-Luxembourg Army"
  LUX_joint_army_desc:0 "Unified defensive commands make our army more effective."

  # Intro Event
  luxembourg.1.t:0 "The Situation of Luxembourg"
  luxembourg.1.d:0 "In 1936, the Grand Duchy of Luxembourg finds itself in a precarious position. We are disarmed, neutral, and surrounded by powerful neighbors. Yet, our steel industry is one of the strongest in Europe. As tensions rise across the continent, we must decide our path: should we preserve our democracy, strengthen the monarchy, or look to the radical movements to reshape our destiny?"
  luxembourg.1.a:0 "We must plan carefully."

  # Communist Focuses
  LUX_isci_sinifi_uyaniyor:0 "The Working Class Awakens"
  LUX_isci_sinifi_uyaniyor_desc:0 "The workers of Luxembourg are beginning to organize. We must coordinate their efforts and prepare for the struggle ahead.\n\nWARNING: We must unify the communist organizations before the 1937 Maulkuerfgesetz Referendum occurs. If we fail to complete the 'Resistance to the '37 Referendum' focus before 1937, the communist movement will be outlawed, locking this path!"
  LUX_sanayi_iscilerini_orgutle:0 "Organize Industrial Workers"
  LUX_sanayi_iscilerini_orgutle_desc:0 "Industrial workers represent the core of our revolutionary movement. We must establish strong unions and factory councils."
  LUX_celik_fabrikalarinda_ajitasyon:0 "Agitation in Steel Mills"
  LUX_celik_fabrikalarinda_ajitasyon_desc:0 "Luxembourg's massive steelworks are ripe for agitation. We will send political commissars to recruit steelworkers to our cause."
  LUX_akademiyi_kazan:0 "Win the Academy"
  LUX_akademiyi_kazan_desc:0 "Intellectuals and university students play a critical role in spreading revolutionary theory. We will establish cells in educational institutes."
  LUX_ulke_capinda_genel_grev:0 "Nationwide General Strike"
  LUX_ulke_capinda_genel_grev_desc:0 "By shutting down all major industries, transport networks, and public services, we will demonstrate the raw power of the organized working class."
  LUX_37_referandumuna_direnis:0 "Resistance to the '37 Referendum"
  LUX_37_referandumuna_direnis_desc:0 "The government is trying to outlaw communist organizations through a referendum. We must unify all left-wing forces to wage a massive campaign and resist this legislation."
  LUX_sokak_gosterileri:0 "Street Demonstrations"
  LUX_sokak_gosterileri_desc:0 "Massive public marches and rallies will dominate the public square, showing the strength of our movement and demoralizing our opponents."
  LUX_mecliste_siyasi_baski:0 "Parliamentary Political Pressure"
  LUX_mecliste_siyasi_baski_desc:0 "Using our presence in parliament and the support of the streets, we will force the government to yield to our legislative demands."
  LUX_alt_rutbeli_subaylari_kazan:0 "Win the Junior Officers"
  LUX_alt_rutbeli_subaylari_kazan_desc:0 "By winning the support of junior officers and soldiers in the army, we will ensure that the military will not turn its weapons on the workers."
  LUX_buyuk_duses_ile_tarihi_uzlasma:0 "Historical Compromise with the Grand Duchess"
  LUX_buyuk_duses_ile_tarihi_uzlasma_desc:0 "To preserve national unity and stability, we will negotiate a historic compromise: a Worker-Monarchist hybrid state where Charlotte remains as a non-ruling head of state while the workers run the nation."
  LUX_kraliyet_ailesini_lagvet:0 "Abolish the Royal Family"
  LUX_kraliyet_ailesini_lagvet_desc:0 "The monarchy is an outdated, classist institution. We will officially abolish the royal family, confiscate their estates, and declare a true workers' republic."
  LUX_luksemburg_isci_cumhuriyeti:0 "Luxembourg Workers' Republic"
  LUX_luksemburg_isci_cumhuriyeti_desc:0 "Luxembourg is officially reconstituted as a Workers' Republic under the leadership of the Communist Party of Luxembourg (KPL)."

  # Communist Ideas
  LUX_genel_grev_hazirligi_spirit:0 "General Strike Preparation"
  LUX_genel_grev_hazirligi_spirit_desc:0 "Our workers are actively preparing for a nationwide general strike. While this boosts class consciousness and communist support, it disrupts economic production and decreases political stability."
  LUX_meclis_baskisi_spirit:0 "Parliamentary Pressure"
  LUX_meclis_baskisi_spirit_desc:0 "Our legislative pressure and street presence grant us major political momentum, allowing us to implement our program more efficiently."
  LUX_ordu_destegi_spirit:0 "Military Junior Officer Support"
  LUX_ordu_destegi_spirit_desc:0 "The junior officers and troops support our revolutionary ideals, boosting army attack and defense organization."

  # Communist Events
  luxembourg.2.t:0 "Resistance to the 1937 Referendum"
  luxembourg.2.d:0 "The government's attempts to push through the anti-communist Maulkuerfgesetz ('Muzzle Law') have met with fierce, organized resistance. By merging the various left-wing organizations and trade unions under a unified command, we have successfully launched a massive counter-propaganda campaign. The working class has spoken, and the referendum is dead in the water. The KPL will remain legal!"
  luxembourg.2.a:0 "The workers cannot be silenced!"
  luxembourg.3.t:0 "The Historical Compromise"
  luxembourg.3.d:0 "Following intense negotiations between the Communist Party of Luxembourg (KPL) and the Grand Ducal Court, a unique agreement has been reached. To preserve stability and avoid a bloody civil war, Grand Duchess Charlotte has agreed to renounce all political power and crown authority, accepting a ceremonial status. In return, the KPL recognizes her as a symbol of cultural unity. Luxembourg is now a unique 'Hybrid Workers' Monarchy'!"
  luxembourg.3.a:0 "A new synthesis for our nation."
  luxembourg.4.t:0 "The Maulkuerfgesetz Referendum of 1937"
  luxembourg.4.d:0 "Today, the citizens of Luxembourg go to the polls to vote on the Maulkuerfgesetz ('Muzzle Law'), a controversial legislative proposal aiming to outlaw the Communist Party of Luxembourg (KPL) and ban other radical organizations."
  luxembourg.4.a:0 "Thanks to our early resistance efforts, the ban is soundly defeated!"
  luxembourg.4.b:0 "Without a unified resistance effort, the law is passed. The KPL is outlawed and its leaders are arrested."

  # Stalinist Path Focuses
  LUX_sovyet_ittifakina_katil:0 "Join the Soviet Alliance"
  LUX_sovyet_ittifakina_katil_desc:0 "To survive in a hostile Europe, we must seek the protection of the Soviet Union and formally join the Comintern."
  LUX_sovyetlere_ticaret_imtiyazlari:0 "Trade Concessions to the Soviets"
  LUX_sovyetlere_ticaret_imtiyazlari_desc:0 "Granting the USSR preferential trade terms will cement our economic alliance and bring development resources."
  LUX_kizil_celik_ihracati:0 "Red Steel Export"
  LUX_kizil_celik_ihracati_desc:0 "We will coordinate our industrial output to supply the Soviet military-industrial machine with high-grade Luxembourg steel."
  LUX_sovyet_gocmenleri:0 "Soviet Immigrants"
  LUX_sovyet_gocmenleri_desc:0 "Welcoming thousands of Soviet workers and specialists will provide us with much-needed manpower, though it may stir up local tensions."
  LUX_sovyet_sanayi_entegrasyonu:0 "Soviet Industrial Integration"
  LUX_sovyet_sanayi_entegrasyonu_desc:0 "By standardizing our factories with Soviet specifications, we can increase our production capacity."
  LUX_kizil_ordu_danismanlari:0 "Red Army Advisors"
  LUX_kizil_ordu_danismanlari_desc:0 "Experienced Soviet generals will join our military command to organize and train our armed forces."
  LUX_sovyet_garnizonu:0 "Soviet Garrison"
  LUX_sovyet_garnizonu_desc:0 "Stationing permanent Red Army divisions in our capital will guarantee our defense against imperialist aggressors."
  LUX_halki_baskila:0 "Suppress the Populace (The Great Purge)"
  LUX_halki_baskila_desc:0 "To ensure absolute political compliance and eliminate potential saboteurs, we will institute strict controls and align our state administration directly with Moscow."

  # Trotskyist Path Focuses
  LUX_benelukste_isci_demokrasisi:0 "Workers' Democracy in the Benelux"
  LUX_benelukste_isci_demokrasisi_desc:0 "Rejecting the bureaucratic command of Moscow, we will chart an independent course of workers' self-management and international revolution."
  LUX_calisma_saatlerini_kisalt:0 "Shorten Work Hours"
  LUX_calisma_saatlerini_kisalt_desc:0 "Reducing the standard workday will give workers more leisure and political education time, boosting overall productivity."
  LUX_yan_haklari_gelistir:0 "Improve Benefits"
  LUX_yan_haklari_gelistir_desc:0 "Expanding social security, healthcare, and pensions will solidify public support for the workers' administration."
  LUX_egitim_temel_haktir:0 "Education is a Basic Right"
  LUX_egitim_temel_haktir_desc:0 "Providing free, high-quality education and university scholarships will accelerate scientific research and train the next generation of specialists."
  LUX_komunist_kongre:0 "Communist Congress"
  LUX_komunist_kongre_desc:0 "Hosting an international congress will allow us to coordinate with left-wing movements in Belgium and the Netherlands, spreading our revolutionary ideas."
  LUX_akademiler_arasi_siyasi_baglar:0 "Inter-Academy Political Ties"
  LUX_akademiler_arasi_siyasi_baglar_desc:0 "Forging academic and theoretical networks across Benelux universities will build a strong cadre of revolutionary intellectuals."
  LUX_ordudaki_anti_komunistleri_sisle:0 "Purge Anti-Communists in the Military"
  LUX_ordudaki_anti_komunistleri_sisle_desc:0 "We must identify and remove reactionary elements from the armed forces to ensure they do not sabotage the upcoming revolution."
  LUX_belcika_komunist_protestolari:0 "Belgian Communist Protests"
  LUX_belcika_komunist_protestolari_desc:0 "We will support and finance massive general strikes and street protests across Belgium's industrial regions, destabilizing the capitalist regime."
  LUX_hollanda_kraliyet_karsiti_gosteriler:0 "Dutch Anti-Royalist Demonstrations"
  LUX_hollanda_kraliyet_karsiti_gosteriler_desc:0 "Stirring up anti-monarchical sentiments in the Netherlands will challenge the crown's authority and mobilize the republican working class."
  LUX_belcika_meclisini_yak:0 "Burn the Belgian Parliament"
  LUX_belcika_meclisini_yak_desc:0 "A bold, symbolic action that will paralyze the Belgian government and show that the bourgeois state is obsolete."
  LUX_kolonileri_bagimsizlastir:0 "Decolonize the Colonies"
  LUX_kolonileri_bagimsizlastir_desc:0 "By supporting independence movements in the Dutch colonies, we will weaken the economic base of Dutch capitalism and liberate oppressed peoples."
  LUX_belcika_isci_devrimi:0 "Belgian Workers' Revolution"
  LUX_belcika_isci_devrimi_desc:0 "Providing arms and volunteers will help Belgian comrades launch an armed insurrection to overthrow the capitalist government."
  LUX_hollanda_isci_devrimi:0 "Dutch Workers' Revolution"
  LUX_hollanda_isci_devrimi_desc:0 "The Dutch proletariat is ready. We will assist them in launching a revolution to establish a workers' republic."
  LUX_kizil_beneluks_pakti:0 "Red Benelux Pact"
  LUX_kizil_beneluks_pakti_desc:0 "We will unite the newly established workers' republics of Belgium, the Netherlands, and Luxembourg into a mutual defense alliance."
  LUX_bagimsiz_isci_cumhuriyetleri:0 "Independent Workers' Republics"
  LUX_bagimsiz_isci_cumhuriyetleri_desc:0 "Allowing our allies to govern themselves independently while maintaining a strong military alliance will build a fraternal federation based on mutual trust."
  LUX_beneluks_komunler_birligi:0 "Union of Benelux Communes"
  LUX_beneluks_komunler_birligi_desc:0 "To ensure maximum efficiency and defense, we will merge Belgium and the Netherlands directly into Luxembourg, establishing a unified Benelux Commune."

  # Stalinist & Trotskyist Ideas
  LUX_sovyet_gocmenleri_spirit:0 "Soviet Immigrant Workforce"
  LUX_sovyet_gocmenleri_spirit_desc:0 "Thousands of Soviet workers have migrated to Luxembourg. They expand our workforce but increase domestic political friction."
  LUX_sovyet_sanayi_spirit:0 "Soviet Industrial Specifications"
  LUX_sovyet_sanayi_spirit_desc:0 "Standardization with Soviet production systems increases factory efficiency."
  LUX_kisaltilmis_calisma_saatleri_spirit:0 "Shortened Workday"
  LUX_kisaltilmis_calisma_saatleri_spirit_desc:0 "An 8-hour workday ensures workers have time for education and community participation, lowering the consumer goods requirement."
  LUX_egitim_bursu_spirit:0 "State Educational Bursaries"
  LUX_egitim_bursu_spirit_desc:0 "Full state funding for universities and scientific research centers accelerates technological progress."
  LUX_kizil_pakt_spirit:0 "Fraternal Mutual Defense"
  LUX_kizil_pakt_spirit_desc:0 "Unified training and joint commands within the Red Benelux Pact make our defense forces highly integrated and effective."

  # Communist Endgame Focuses
  LUX_devrimin_meyveleri:0 "Devrimin Meyveleri"
  LUX_devrimin_meyveleri_desc:0 "The revolution has borne fruit. With the establishment of the workers' state, we must now secure our economy and prepare our defense."
  LUX_gecilemez_luksemburg:0 "Geçilemez Lüksemburg"
  LUX_gecilemez_luksemburg_desc:0 "We will construct an impenetrable fortress of workers' willpower and concrete to secure the heartland."
  LUX_anavatan_savunmasi:0 "Anavatan Savunması"
  LUX_anavatan_savunmasi_desc:0 "Our land is small but our resolve is grand. Every worker will defend their home state to the last drop of blood."
  LUX_taktiksel_karsi_taarruz:0 "Taktiksel Karşı Taarruz"
  LUX_taktiksel_karsi_taarruz_desc:0 "Defense is not enough. We must prepare coordinated tactics to strike back at the aggressors."
  LUX_bati_duvari:0 "Batı Duvarı"
  LUX_bati_duvari_desc:0 "Construct max level fortifications on our borders with France to keep out the imperialist reactionaries."
  LUX_dogu_duvari:0 "Doğu Duvarı"
  LUX_dogu_duvari_desc:0 "Construct max level fortifications on our borders with Germany to withstand the fascist onslaught."
  LUX_rotterdam_sentetik_tesisleri:0 "Rotterdam Sentetik Tesisleri"
  LUX_rotterdam_sentetik_tesisleri_desc:0 "Establishing large synthetic oil and rubber production plants in Rotterdam to secure our raw materials."
  LUX_beneluks_madenleri:0 "Benelüks Madenleri"
  LUX_beneluks_madenleri_desc:0 "Expanding heavy iron, steel, and chromium extraction operations in our core mining regions."
  LUX_son_nefese_kadar:0 "Son Nefese Kadar"
  LUX_son_nefese_kadar_desc:0 "We will never surrender. Our nation will fight to the very last breath, resisting any invader."
  LUX_kizil_taarruz:0 "Kızıl Taarruz"
  LUX_kizil_taarruz_desc:0 "The best defense is a relentless offense. We must carry the red banner across our borders."
  LUX_hizlandirilmis_askeri_insaat:0 "Hızlandırılmış Askeri İnşaat"
  LUX_hizlandirilmis_askeri_insaat_desc:0 "Prioritizing the construction of arms factories and assembly lines to supply our expanding army."
  LUX_seri_silah_uretimi:0 "Seri Silah Üretimi"
  LUX_seri_silah_uretimi_desc:0 "Optimizing manufacturing processes to mass produce infantry equipment at minimal cost."
  LUX_kizil_zirhlilar:0 "Kızıl Zırhlılar"
  LUX_kizil_zirhlilar_desc:0 "Investing in steel mills and assembly lines to produce medium tanks efficiently."
  LUX_maksimum_verimlilik:0 "Maksimum Verimlilik"
  LUX_maksimum_verimlilik_desc:0 "Aligning industrial operations to achieve maximum factory output and speed."
  LUX_topyekun_savas_ekonomisi:0 "Topyekün Savaş Ekonomisi"
  LUX_topyekun_savas_ekonomisi_desc:0 "Mobilizing all state resources and closing the market to foreign capital, focusing solely on the war effort."
  LUX_aluminyum_kamulastirmasi:0 "Alüminyum Kamulaştırması"
  LUX_aluminyum_kamulastirmasi_desc:0 "Seizing and nationalizing local aluminum deposits to fuel our industrial and aircraft production."
  LUX_stratejik_kaynak_el_konmasi:0 "Stratejik Kaynak El Konması"
  LUX_stratejik_kaynak_el_konmasi_desc:0 "Taking direct state control of oil reserves and rubber plantations to keep our motorized divisions running."
  LUX_fransiz_komunistlerini_fonla:0 "Fransız Komünistlerini Fonla"
  LUX_fransiz_komunistlerini_fonla_desc:0 "Secretly funneling political power and financial resources to support the French communist party, destabilizing their government."
  LUX_alman_komunistlerini_fonla:0 "Alman Komünistlerini Fonla"
  LUX_alman_komunistlerini_fonla_desc:0 "Funneling resources to German communist movements to stir up unrest in the heart of the Reich."
  LUX_fransiz_iscilerini_kiskirt:0 "Fransız İşçilerini Kışkırt"
  LUX_fransiz_iscilerini_kiskirt_desc:0 "Launching mass strikes and agitation campaigns among French factory workers to disrupt their war machine."
  LUX_alman_iscilerini_kiskirt:0 "Alman İşçilerini Kışkırt"
  LUX_alman_iscilerini_kiskirt_desc:0 "Agitating German industrial workers to launch sabotage and anti-war demonstrations."
  LUX_fransanin_parcalanmasi:0 "Fransa'nın Parçalanması"
  LUX_fransanin_parcalanmasi_desc:0 "Stirring the flames of revolution, triggering a civil war and backing the independence of Brittany, Limousin, and Atlantiques."
  LUX_almanya_nin_parcalanmasi:0 "Almanya'nın Parçalanması"
  LUX_almanya_nin_parcalanmasi_desc:0 "Triggering a massive civil war in Germany and splitting it into Rhineland, Westphalia, Bavaria, Hesse, Saxony, Silesia, Kashubia, and Prussia."
  LUX_kizil_avrupa_pakti:0 "Kızıl Avrupa Paktı"
  LUX_kizil_avrupa_pakti_desc:0 "Luxembourg forms its own communist faction and invites all breakaway states and communist remnants into a grand alliance."
  LUX_avrupa_komunler_birligi:0 "Avrupa Komünler Birliği"
  LUX_avrupa_komunler_birligi_desc:0 "Annexing and coring all faction members, creating a single unified commune of the European working class."

